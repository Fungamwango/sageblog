<!DOCTYPE html>
<html lang="en">
<script>document.documentElement.dataset.theme=localStorage.getItem('theme')||'dark'</script>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Join — SageBlog</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>🔮</text></svg>">
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div style="position:absolute;top:1rem;right:1rem">
      <button class="theme-toggle" id="theme-toggle-btn"></button>
    </div>

    <a href="/" class="site-logo" style="justify-content:center;display:flex;margin-bottom:0.5rem">🔮 Sage<span>Blog</span></a>
    <p style="text-align:center;font-size:0.875rem;color:var(--text-2);margin-bottom:1.75rem">Pick a username to join the conversation</p>

    <form id="join-form">
      <div class="form-group">
        <label for="username-input">Username</label>
        <input type="text" id="username-input" placeholder="e.g. curiousreader" required minlength="2" maxlength="30" autocomplete="username" autofocus>
        <div style="font-size:0.75rem;color:var(--text-3);margin-top:0.35rem">Letters, numbers, spaces, - and _ only. No password needed.</div>
      </div>
      <div id="join-error" class="form-error"></div>
      <button type="submit" class="btn btn-primary w-full" style="margin-top:0.75rem">Continue →</button>
    </form>

    <div id="admin-toggle" style="margin-top:1.5rem;text-align:center">
      <button class="btn btn-sm" id="show-admin-btn" style="background:transparent;color:var(--text-3);font-size:0.75rem">Admin login</button>
    </div>

    <form id="admin-form" class="hidden" style="margin-top:1rem;border-top:1px solid var(--border);padding-top:1rem">
      <div class="form-group">
        <label for="admin-email">Email</label>
        <input type="email" id="admin-email" placeholder="admin@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="admin-password">Password</label>
        <input type="password" id="admin-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div id="admin-error" class="form-error"></div>
      <button type="submit" class="btn btn-primary w-full" style="margin-top:0.5rem">Admin Sign In</button>
    </form>
  </div>
</div>

<script type="module">
import { quickLogin, login, isLoggedIn } from '/assets/js/auth.js';
import { toggleTheme } from '/assets/js/theme.js';

if (isLoggedIn()) window.location.href = '/';

const toggleBtn = document.getElementById('theme-toggle-btn');
const isDark = () => (document.documentElement.dataset.theme || 'dark') === 'dark';
toggleBtn.textContent = isDark() ? '☀️' : '🌙';
toggleBtn.addEventListener('click', () => { toggleTheme(); toggleBtn.textContent = isDark() ? '☀️' : '🌙'; });

// Quick join form
document.getElementById('join-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = e.target.querySelector('button[type=submit]');
  const err = document.getElementById('join-error');
  err.textContent = '';
  btn.disabled = true; btn.textContent = 'Joining…';
  try {
    await quickLogin(document.getElementById('username-input').value.trim());
    window.location.href = sessionStorage.getItem('returnTo') || '/';
  } catch (ex) {
    err.textContent = ex.message;
  } finally {
    btn.disabled = false; btn.textContent = 'Continue →';
  }
});

// Admin login toggle
document.getElementById('show-admin-btn').addEventListener('click', () => {
  document.getElementById('admin-form').classList.toggle('hidden');
  document.getElementById('join-form').classList.toggle('hidden');
  document.getElementById('admin-toggle').querySelector('button').textContent =
    document.getElementById('admin-form').classList.contains('hidden') ? 'Admin login' : '← Back';
});

document.getElementById('admin-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = e.target.querySelector('button[type=submit]');
  const err = document.getElementById('admin-error');
  err.textContent = '';
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    await login(document.getElementById('admin-email').value, document.getElementById('admin-password').value);
    window.location.href = '/admin';
  } catch (ex) {
    err.textContent = ex.message;
  } finally {
    btn.disabled = false; btn.textContent = 'Admin Sign In';
  }
});
</script>
</body>
</html>
