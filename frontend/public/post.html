<!DOCTYPE html>
<html lang="en">
<script>document.documentElement.dataset.theme=localStorage.getItem('theme')||'dark'</script>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Loading… — SageBlog</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>🔮</text></svg>">
  
  
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="/" class="site-logo">🔮 Sage<span>Blog</span></a>
    <nav class="header-nav">
      <a href="/">Home</a>
      <a href="/category/technology">Tech</a>
      <a href="/category/science">Science</a>
      <a href="/category/business">Business</a>
      <a href="/category/health">Health</a>
    </nav>
    <div class="header-actions" id="header-auth"></div>
  </div>
</header>

<div id="post-wrap">
  <!-- Post Hero -->
  <section class="post-hero">
    <div class="container-narrow">
      <div class="post-hero-category">
        <span class="skeleton" style="height:22px;width:100px;display:inline-block;border-radius:999px"></span>
      </div>
      <div class="skeleton" style="height:48px;width:90%;margin-bottom:1rem"></div>
      <div class="skeleton" style="height:24px;width:70%;margin-bottom:1.5rem"></div>
      <div class="flex items-center gap-4">
        <span class="skeleton" style="height:16px;width:120px"></span>
        <span class="skeleton" style="height:16px;width:80px"></span>
      </div>
    </div>
  </section>

  <!-- Post Content -->
  <div class="container-narrow">
    <article class="post-content" id="post-content">
      <div class="skeleton" style="height:16px;width:100%;margin-bottom:12px"></div>
      <div class="skeleton" style="height:16px;width:95%;margin-bottom:12px"></div>
      <div class="skeleton" style="height:16px;width:88%;margin-bottom:24px"></div>
      <div class="skeleton" style="height:28px;width:60%;margin-bottom:16px"></div>
      <div class="skeleton" style="height:16px;width:100%;margin-bottom:12px"></div>
      <div class="skeleton" style="height:16px;width:92%;margin-bottom:12px"></div>
    </article>

    <!-- Post Footer (tags + like) -->
    <div id="post-footer" style="padding:1.5rem 0;border-top:1px solid var(--border);display:flex;align-items:center;gap:1rem;flex-wrap:wrap"></div>

    <!-- Comments -->
    <section class="comments-section" id="comments-section" style="display:none">
      <h3 id="comments-heading">Comments</h3>
      <div id="comment-form-wrap"></div>
      <div id="comments-list"></div>
      <div class="pagination" id="comments-pagination"></div>
    </section>
  </div>
</div>

<aside style="background:var(--bg-card);border-top:1px solid var(--border);padding:2.5rem 0;margin-top:2rem">
  <div class="container">
    <div class="section-header">
      <h3 class="section-title">Popular Posts</h3>
    </div>
    <div class="post-grid" id="popular-posts"></div>
    <div style="text-align:center;margin-top:2rem">
      <a href="/" class="btn btn-outline">See all posts →</a>
    </div>
  </div>
</aside>

<footer class="site-footer">
  <div class="container">
    <div class="footer-bottom">
      <span>© <span class="copy-year"></span> SageBlog.cfd</span>
      <span>Powered by Cloudflare Workers AI</span>
    </div>
  </div>
</footer>

<script type="module">
import { get, post, del, patch } from '/assets/js/api.js';
import { updateHeaderAuth, isLoggedIn, getUser } from '/assets/js/auth.js';
import { escHtml, linkify, timeAgo, formatDate, slugFromPath, toast, renderPostCard, mdToHtml } from '/assets/js/utils.js';
import { setMeta, injectArticleLD, extractMedia } from '/assets/js/seo.js';

updateHeaderAuth();

const slug = slugFromPath('/post/');
if (!slug) { window.location.href = '/'; }

let postData = null;
let commentsPage = 1;

async function loadPost() {
  try {
    const p = await get(`/posts/${slug}`);
    postData = p;
    renderPost(p);
    loadComments();
    loadPopular();
  } catch {
    document.getElementById('post-wrap').innerHTML = `
      <div class="container-narrow" style="padding:4rem 1.5rem;text-align:center">
        <h2>Post not found</h2>
        <p class="text-dim">This post may have been removed.</p>
        <a href="/" class="btn btn-primary" style="margin-top:1rem">← Back Home</a>
      </div>`;
  }
}

function renderPost(p) {
  const { image: mediaImage, video: mediaVideo } = extractMedia(p.content);
  const postUrl = `https://sageblog.cfd/post/${p.slug}`;

  setMeta({
    title: p.meta_title || p.title,
    description: p.meta_desc || p.excerpt,
    url: postUrl,
    type: 'article',
    image: mediaImage,
    video: mediaVideo,
  });

  injectArticleLD({
    title: p.title,
    description: p.excerpt,
    url: postUrl,
    publishedAt: p.published_at,
    modifiedAt: p.updated_at,
    image: mediaImage,
    video: mediaVideo,
  });

  document.querySelector('.post-hero').innerHTML = `
    <div class="container-narrow">
      <div class="post-hero-category">
        <a href="/category/${escHtml(p.category_slug)}" class="cat-pill">${escHtml(p.category_name)}</a>
        ${p.ai_generated
          ? '<span class="ai-badge" style="margin-left:0.5rem">🤖 AI</span>'
          : p.author_username
            ? `<span class="ai-badge" style="margin-left:0.5rem;background:rgba(99,102,241,0.15);color:var(--primary-light);border:1px solid rgba(99,102,241,0.3)">👤 ${escHtml(p.author_username)}</span>`
            : ''}
      </div>
      <h1 class="post-title">${escHtml(p.title)}</h1>
      <p class="post-subtitle">${escHtml(p.excerpt)}</p>
      <div class="post-byline">
        <span class="post-byline-item">📅 ${formatDate(p.published_at)}</span>
        <span class="post-byline-item">👁 ${p.view_count} views</span>
        <span class="post-byline-item">♥ <span id="like-count">${p.like_count}</span> likes</span>
        <span class="post-byline-item">💬 ${p.comment_count} comments</span>
        <button class="btn btn-outline btn-sm" id="byline-share-btn">↗ Share</button>
      </div>
    </div>
  `;


  document.getElementById('post-content').innerHTML = mdToHtml(p.content);

  // Hide broken images, make remaining ones full-width
  document.getElementById('post-content').querySelectorAll('img').forEach(img => {
    img.onerror = () => { img.closest('.post-media')?.remove() || img.remove(); };
    img.style.cssText = 'width:100%;max-width:100%;height:auto;border-radius:10px;margin:1.25rem 0;display:block;object-fit:cover';
  });

  // Post footer: tags + like
  const tags = (p.tags || []).map(t =>
    `<a href="/tag/${escHtml(t.toLowerCase().replace(/\s+/g,'-'))}" class="tag-pill">${escHtml(t)}</a>`
  ).join('');

  const likedClass = p.liked_by_user ? 'liked' : '';
  const user = getUser();
  const canEdit = user && (user.id === p.author_id || user.role === 'admin') && !p.ai_generated;

  document.getElementById('post-footer').innerHTML = `
    <div class="post-tags" style="flex:1">${tags}</div>
    <button class="like-btn ${likedClass}" id="like-btn" ${!isLoggedIn() ? 'title="Login to like"' : ''}>
      ♥ <span id="like-btn-count">${p.like_count}</span> Like
    </button>
    <button class="btn btn-outline btn-sm" id="share-btn">↗ Share</button>
    ${canEdit ? `<button class="btn btn-outline btn-sm" id="edit-post-btn">✏️ Edit</button>` : ''}
    ${canEdit ? `<button class="btn btn-outline btn-sm" id="delete-post-btn" style="color:var(--danger)">🗑 Delete</button>` : ''}
    <a href="/" class="btn btn-outline btn-sm">← Back</a>
  `;

  // Share panel (inserted after footer)
  const sharePanelWrap = document.createElement('div');
  sharePanelWrap.id = 'share-panel-wrap';
  document.getElementById('post-footer').after(sharePanelWrap);

  // Edit post inline form (inserted after share panel)
  const editPostWrap = document.createElement('div');
  editPostWrap.id = 'edit-post-wrap';
  sharePanelWrap.after(editPostWrap);

  document.getElementById('like-btn').addEventListener('click', handleLike);
  document.getElementById('share-btn').addEventListener('click', () => sharePost(p.title, postUrl));
  document.getElementById('byline-share-btn').addEventListener('click', () => sharePost(p.title, postUrl));

  document.getElementById('edit-post-btn')?.addEventListener('click', () => {
    const wrap = document.getElementById('edit-post-wrap');
    if (wrap.innerHTML) { wrap.innerHTML = ''; return; }
    wrap.innerHTML = `
      <div style="margin-top:1rem;padding:1.25rem;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r)">
        <h4 style="margin-bottom:0.75rem">Edit Post</h4>
        <textarea id="edit-post-content" rows="10" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:0.75rem;color:var(--text);font-family:var(--font);font-size:0.9rem;outline:none;resize:vertical"></textarea>
        <div style="display:flex;gap:0.5rem;margin-top:0.75rem">
          <button class="btn btn-primary btn-sm" id="save-post-btn">Save</button>
          <button class="btn btn-outline btn-sm" onclick="document.getElementById('edit-post-wrap').innerHTML=''">Cancel</button>
        </div>
      </div>`;
    // Populate textarea with plain text (strip HTML tags)
    const tmp = document.createElement('div');
    tmp.innerHTML = p.content;
    document.getElementById('edit-post-content').value = tmp.innerText || tmp.textContent || '';
    document.getElementById('save-post-btn').addEventListener('click', async () => {
      const content = document.getElementById('edit-post-content').value.trim();
      if (!content) return;
      try {
        await patch(`/posts/${slug}`, { content });
        toast('Post updated');
        wrap.innerHTML = '';
        loadPost();
      } catch (e) { toast(e.message || 'Failed to update', 'error'); }
    });
  });

  document.getElementById('delete-post-btn')?.addEventListener('click', async () => {
    const ok = await showModal({ title: 'Delete post', message: 'This will permanently delete your post. Are you sure?', confirmLabel: 'Delete', danger: true });
    if (!ok) return;
    try {
      await del(`/posts/${slug}`);
      toast('Post deleted');
      setTimeout(() => window.location.href = '/', 800);
    } catch (e) { toast(e.message || 'Failed to delete', 'error'); }
  });
  document.getElementById('comments-section').style.display = 'block';
}

async function handleLike() {
  if (!isLoggedIn()) {
    const user = await requireUser();
    if (!user) return;
  }
  try {
    const data = await post(`/posts/${slug}/like`, {});
    const btn = document.getElementById('like-btn');
    btn.classList.toggle('liked', data.liked);
    document.getElementById('like-count').textContent = data.like_count;
    document.getElementById('like-btn-count').textContent = data.like_count;
  } catch {
    toast('Failed to update like', 'error');
  }
}

async function loadComments() {
  const user = getUser();
  const formWrap = document.getElementById('comment-form-wrap');

  formWrap.innerHTML = `
    <div class="comment-form">
      <div class="form-group">
        <label>Add a comment</label>
        <textarea id="comment-input" placeholder="Share your thoughts…" rows="3"></textarea>
      </div>
      <button class="btn btn-primary btn-sm" id="submit-comment">Post Comment</button>
    </div>
  `;
  document.getElementById('submit-comment').addEventListener('click', submitComment);

  await fetchComments(1);
}

async function fetchComments(page) {
  commentsPage = page;
  try {
    const data = await get(`/posts/${slug}/comments?page=${page}&limit=15`);
    document.getElementById('comments-heading').textContent = `Comments (${data.total})`;
    document.getElementById('comments-list').innerHTML = data.comments.length
      ? data.comments.map(renderComment).join('')
      : `<p class="text-muted text-sm">No comments yet. Be the first!</p>`;

    const pages = Math.ceil(data.total / 15);
    const pag = document.getElementById('comments-pagination');
    pag.innerHTML = '';
    if (pages > 1) {
      if (page > 1) pag.innerHTML += `<button class="page-btn" onclick="fetchCommentPage(${page-1})">← Prev</button>`;
      if (page < pages) pag.innerHTML += `<button class="page-btn" onclick="fetchCommentPage(${page+1})">Next →</button>`;
    }
  } catch {
    document.getElementById('comments-list').innerHTML = `<p class="text-muted text-sm">Failed to load comments.</p>`;
  }
}

window.fetchCommentPage = fetchComments;

function renderComment(c, isReply = false) {
  const user = getUser();
  const initials = (c.username || '?').slice(0, 2).toUpperCase();
  const canDelete = user && (user.id === c.user_id || user.role === 'admin');
  const replies = (c.replies || []).map(r => renderComment(r, true)).join('');

  return `
    <div class="comment" data-id="${c.id}">
      <div class="comment-avatar">${escHtml(initials)}</div>
      <div style="flex:1">
        <div class="comment-body">
          <div class="comment-header">
            <span class="comment-username">${escHtml(c.username)}</span>
            <span class="comment-time">${timeAgo(c.created_at)}</span>
          </div>
          <div class="comment-text">${linkify(c.content)}</div>
          <div class="comment-actions">
            ${!isReply ? `<button class="comment-action" onclick="showReply(${c.id})">Reply</button>` : ''}
            ${canDelete ? `<button class="comment-action" onclick="editComment(${c.id}, ${JSON.stringify(c.content)})">Edit</button>` : ''}
            ${canDelete ? `<button class="comment-action" style="color:var(--red)" onclick="deleteComment(${c.id})">Delete</button>` : ''}
          </div>
          <div id="edit-form-${c.id}"></div>
          <div id="reply-form-${c.id}"></div>
        </div>
        ${replies ? `<div class="comment-replies">${replies}</div>` : ''}
      </div>
    </div>
  `;
}

window.showReply = (parentId) => {
  const wrap = document.getElementById(`reply-form-${parentId}`);
  if (wrap.innerHTML) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = `
    <div style="margin-top:0.75rem">
      <textarea id="reply-${parentId}" placeholder="Write a reply…" rows="2" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:0.5rem;color:var(--text);font-family:inherit;font-size:0.875rem;outline:none;resize:vertical"></textarea>
      <button class="btn btn-primary btn-sm" style="margin-top:0.5rem" onclick="submitReply(${parentId})">Reply</button>
    </div>
  `;
};

window.submitReply = async (parentId) => {
  const input = document.getElementById(`reply-${parentId}`);
  const content = input?.value?.trim();
  if (!content) return;
  if (!isLoggedIn()) {
    const user = await requireUser();
    if (!user) return;
  }
  try {
    await post(`/posts/${slug}/comments`, { content, parent_id: parentId });
    toast('Reply posted!');
    fetchComments(commentsPage);
  } catch (e) {
    toast(e.message || 'Failed to post reply', 'error');
  }
};

// ── Username modal for guests ────────────────────────────────────
async function requireUser() {
  if (getUser()) return getUser();
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-box" role="dialog" aria-modal="true" style="max-width:340px">
        <p class="modal-title">Enter your name</p>
        <input id="guest-username-input" type="text" placeholder="your name..." maxlength="30" minlength="2"
          style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:0.5rem 0.75rem;color:var(--text);font-family:var(--font);font-size:0.9rem;outline:none;box-sizing:border-box;margin-bottom:0.4rem">
        <span id="guest-username-err" style="font-size:0.78rem;color:var(--danger);display:block;min-height:1rem;margin-bottom:0.5rem"></span>
        <div class="modal-actions">
          <button class="btn btn-outline btn-sm" id="guest-cancel-btn">Cancel</button>
          <button class="btn btn-primary btn-sm" id="guest-join-btn">Join →</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    requestAnimationFrame(() => overlay.classList.add('modal-visible'));

    const close = val => { overlay.classList.remove('modal-visible'); setTimeout(() => overlay.remove(), 200); resolve(val); };

    const doJoin = async () => {
      const username = overlay.querySelector('#guest-username-input').value.trim();
      const err = overlay.querySelector('#guest-username-err');
      err.textContent = '';
      if (!username || username.length < 2) { err.textContent = 'At least 2 characters required'; return; }
      const btn = overlay.querySelector('#guest-join-btn');
      btn.disabled = true; btn.textContent = 'Joining…';
      try {
        const { quickLogin } = await import('/assets/js/auth.js');
        const user = await quickLogin(username);
        updateHeaderAuth();
        close(user);
      } catch (e) {
        err.textContent = e.message;
        btn.disabled = false; btn.textContent = 'Join →';
      }
    };

    overlay.querySelector('#guest-join-btn').addEventListener('click', doJoin);
    overlay.querySelector('#guest-username-input').addEventListener('keydown', e => { if (e.key === 'Enter') doJoin(); });
    overlay.querySelector('#guest-cancel-btn').addEventListener('click', () => close(null));
    overlay.addEventListener('click', e => { if (e.target === overlay) close(null); });
  });
}

// ── Custom modal ────────────────────────────────────────────────
function showModal({ title, message, confirmLabel = 'Confirm', cancelLabel = 'Cancel', danger = false }) {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-box" role="dialog" aria-modal="true">
        <p class="modal-title">${escHtml(title)}</p>
        <p class="modal-message">${escHtml(message)}</p>
        <div class="modal-actions">
          <button class="btn btn-outline btn-sm" id="modal-cancel">${escHtml(cancelLabel)}</button>
          <button class="btn btn-sm ${danger ? 'btn-danger' : 'btn-primary'}" id="modal-confirm">${escHtml(confirmLabel)}</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    requestAnimationFrame(() => overlay.classList.add('modal-visible'));
    const close = val => { overlay.classList.remove('modal-visible'); setTimeout(() => overlay.remove(), 200); resolve(val); };
    overlay.querySelector('#modal-confirm').addEventListener('click', () => close(true));
    overlay.querySelector('#modal-cancel').addEventListener('click', () => close(false));
    overlay.addEventListener('click', e => { if (e.target === overlay) close(false); });
  });
}

window.deleteComment = async (id) => {
  const ok = await showModal({ title: 'Delete comment', message: 'This cannot be undone. Are you sure?', confirmLabel: 'Delete', danger: true });
  if (!ok) return;
  try {
    await del(`/comments/${id}`);
    toast('Comment deleted');
    fetchComments(commentsPage);
  } catch {
    toast('Failed to delete comment', 'error');
  }
};

window.editComment = async (id, current) => {
  const wrap = document.getElementById(`edit-form-${id}`);
  if (wrap.innerHTML) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = `
    <div style="margin-top:0.5rem">
      <textarea id="edit-input-${id}" rows="2" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:0.5rem;color:var(--text);font-family:inherit;font-size:0.875rem;outline:none;resize:vertical">${escHtml(current)}</textarea>
      <div style="display:flex;gap:0.5rem;margin-top:0.4rem">
        <button class="btn btn-primary btn-sm" onclick="saveEdit(${id})">Save</button>
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('edit-form-${id}').innerHTML=''">Cancel</button>
      </div>
    </div>`;
};

window.saveEdit = async (id) => {
  const input = document.getElementById(`edit-input-${id}`);
  const content = input?.value?.trim();
  if (!content) return;
  try {
    await patch(`/comments/${id}`, { content });
    toast('Comment updated');
    fetchComments(commentsPage);
  } catch (e) {
    toast(e.message || 'Failed to update', 'error');
  }
};

async function submitComment() {
  const input = document.getElementById('comment-input');
  const content = input.value.trim();
  if (!content) { toast('Comment cannot be empty', 'error'); return; }
  if (!isLoggedIn()) {
    const user = await requireUser();
    if (!user) return;
  }
  const btn = document.getElementById('submit-comment');
  btn.disabled = true;
  btn.textContent = 'Posting…';
  try {
    await post(`/posts/${slug}/comments`, { content });
    input.value = '';
    toast('Comment posted!');
    fetchComments(1);
  } catch (e) {
    toast(e.message || 'Failed to post comment', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Post Comment';
  }
}

async function sharePost(title, url) {
  if (navigator.share) {
    try { await navigator.share({ title, text: title, url }); return; } catch (e) { if (e.name === 'AbortError') return; }
  }
  // Show share panel
  const wrap = document.getElementById('share-panel-wrap');
  if (wrap.innerHTML) { wrap.innerHTML = ''; return; }
  const enc = encodeURIComponent;
  const platforms = [
    { name: 'X / Twitter', icon: '𝕏', href: `https://twitter.com/intent/tweet?text=${enc(title)}&url=${enc(url)}` },
    { name: 'Facebook',    icon: 'f', href: `https://www.facebook.com/sharer/sharer.php?u=${enc(url)}` },
    { name: 'LinkedIn',    icon: 'in', href: `https://www.linkedin.com/shareArticle?mini=true&url=${enc(url)}&title=${enc(title)}` },
    { name: 'WhatsApp',    icon: '✉', href: `https://wa.me/?text=${enc(title + ' ' + url)}` },
    { name: 'Telegram',    icon: '✈', href: `https://t.me/share/url?url=${enc(url)}&text=${enc(title)}` },
    { name: 'Reddit',      icon: '↑', href: `https://reddit.com/submit?url=${enc(url)}&title=${enc(title)}` },
  ];
  wrap.style.cssText = 'padding:0.75rem 0;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center';
  wrap.innerHTML = `
    <span style="font-size:0.8rem;color:var(--text-3);margin-right:0.25rem">Share:</span>
    ${platforms.map(p => `<a href="${escHtml(p.href)}" target="_blank" rel="noopener" class="btn btn-outline btn-sm" style="font-size:0.75rem">${escHtml(p.icon)} ${escHtml(p.name)}</a>`).join('')}
    <button class="btn btn-outline btn-sm" id="copy-link-btn" style="font-size:0.75rem">🔗 Copy link</button>
  `;
  document.getElementById('copy-link-btn').addEventListener('click', async () => {
    await navigator.clipboard.writeText(url);
    toast('Link copied!');
  });
}

async function loadPopular() {
  try {
    const data = await get(`/posts?sort=views&limit=11`);
    const others = data.posts.filter(p => p.slug !== slug).slice(0, 10);
    document.getElementById('popular-posts').innerHTML = others.length
      ? others.map(renderPostCard).join('')
      : '';
  } catch {}
}

loadPost();
</script>
</body>
</html>
