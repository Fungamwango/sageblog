<!DOCTYPE html>
<html lang="en">
<script>document.documentElement.dataset.theme=localStorage.getItem('theme')||'dark'</script>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Admin — SageBlog</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>🔮</text></svg>">
  
  
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="/" class="site-logo">🔮 Sage<span>Blog</span></a>
    <span style="color:var(--text-2);font-size:0.875rem">Admin Panel</span>
    <div class="header-actions" id="header-auth"></div>
  </div>
</header>

<div class="admin-layout">
  <nav class="admin-sidebar">
    <h4>Menu</h4>
    <div class="admin-sidebar-nav">
      <button class="admin-nav-item active" onclick="showTab('dashboard')">📊 Dashboard</button>
      <button class="admin-nav-item" onclick="showTab('posts')">📝 Posts</button>
      <button class="admin-nav-item" onclick="showTab('users')">👥 Users</button>
      <button class="admin-nav-item" onclick="showTab('generate')">🤖 Generate</button>
      <a href="/" class="admin-nav-item">← Blog</a>
    </div>
  </nav>

  <main class="admin-content" id="admin-content">
    <!-- Dashboard Tab -->
    <div id="tab-dashboard">
      <h2 style="margin-bottom:1.5rem">Dashboard</h2>
      <div class="stat-cards" id="stat-cards">
        <div class="stat-card skeleton" style="height:90px"></div>
        <div class="stat-card skeleton" style="height:90px"></div>
        <div class="stat-card skeleton" style="height:90px"></div>
        <div class="stat-card skeleton" style="height:90px"></div>
        <div class="stat-card skeleton" style="height:90px"></div>
      </div>
    </div>

    <!-- Posts Tab -->
    <div id="tab-posts" class="hidden">
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap">
        <h2 style="margin:0">Posts</h2>
        <input type="text" id="posts-search" placeholder="Search by title or slug…"
          style="flex:1;min-width:200px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:0.45rem 0.75rem;color:var(--text);font-size:0.875rem;outline:none">
      </div>
      <div id="posts-table"></div>
      <div class="pagination" id="posts-pagination" style="margin-top:1rem"></div>
    </div>

    <!-- Users Tab -->
    <div id="tab-users" class="hidden">
      <h2 style="margin-bottom:1.5rem">Users</h2>
      <div id="users-table"></div>
      <div class="pagination" id="users-pagination" style="margin-top:1rem"></div>
    </div>

    <!-- Generate Tab -->
    <div id="tab-generate" class="hidden">
      <h2 style="margin-bottom:0.5rem">Generate AI Posts</h2>
      <p class="text-muted text-sm" style="margin-bottom:1.5rem">Trigger AI to generate new blog posts immediately.</p>

      <div class="sidebar-widget" style="max-width:500px">
        <div class="form-group">
          <label>Category (optional — leave blank to auto-rotate)</label>
          <select id="gen-category">
            <option value="">Auto (round-robin)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Number of posts to generate</label>
          <select id="gen-count">
            <option value="1">1 post</option>
            <option value="2">2 posts</option>
            <option value="3">3 posts</option>
            <option value="5">5 posts</option>
          </select>
        </div>
        <button class="btn btn-primary" id="gen-btn">🤖 Generate Now</button>
      </div>

      <div id="gen-results" style="margin-top:1.5rem"></div>
    </div>

  </main>
</div>

<script type="module">
import { get, post, del } from '/assets/js/api.js';
import { updateHeaderAuth, isAdmin } from '/assets/js/auth.js';
import { escHtml, formatDate, toast } from '/assets/js/utils.js';

updateHeaderAuth();

if (!isAdmin()) {
  document.querySelector('.admin-layout').innerHTML = `
    <div style="padding:4rem;text-align:center;width:100%">
      <h2>Access Denied</h2>
      <p class="text-dim">You need admin access.</p>
      <a href="/login?admin=1" class="btn btn-primary" style="margin-top:1rem">Admin Sign In</a>
    </div>`;
} else {
  init();
}

let postsPage = 1, usersPage = 1;

function init() {
  loadStats();
  loadCategoriesForGen();
  document.getElementById('gen-btn').addEventListener('click', generatePosts);
  document.getElementById('posts-search').addEventListener('input', debounce(() => { postsPage = 1; loadPosts(); }, 400));
}

function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

window.showTab = (tab) => {
  ['dashboard', 'posts', 'users', 'generate'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
  });
  document.querySelectorAll('.admin-nav-item').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('onclick') === `showTab('${tab}')`);
  });
  if (tab === 'posts') loadPosts();
  if (tab === 'users') loadUsers();
};

async function loadPosts() {
  const wrap = document.getElementById('posts-table');
  const search = document.getElementById('posts-search').value.trim();
  wrap.innerHTML = `<div class="loader"><div class="spinner"></div></div>`;
  try {
    const data = await get(`/admin/posts?page=${postsPage}${search ? '&search=' + encodeURIComponent(search) : ''}`);
    if (!data.posts.length) { wrap.innerHTML = '<p class="text-dim">No posts found.</p>'; document.getElementById('posts-pagination').innerHTML = ''; return; }
    wrap.innerHTML = `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:0.85rem">
      <thead><tr style="border-bottom:1px solid var(--border);text-align:left">
        <th style="padding:0.6rem">Title</th>
        <th style="padding:0.6rem">Category</th>
        <th style="padding:0.6rem">Author</th>
        <th style="padding:0.6rem">Views</th>
        <th style="padding:0.6rem">Date</th>
        <th style="padding:0.6rem">Actions</th>
      </tr></thead>
      <tbody>${data.posts.map(p => `
        <tr style="border-bottom:1px solid var(--border)" id="post-row-${p.id}">
          <td style="padding:0.6rem;max-width:300px">
            <a href="/post/${escHtml(p.slug)}" target="_blank" style="color:var(--primary-light);font-weight:500">${escHtml(p.title)}</a>
            ${p.ai_generated ? '<span class="ai-badge" style="margin-left:4px;font-size:0.7rem">🤖</span>' : '<span class="ai-badge" style="margin-left:4px;font-size:0.7rem;background:rgba(99,102,241,0.15);color:var(--primary-light)">👤</span>'}
          </td>
          <td style="padding:0.6rem;color:var(--text-2)">${escHtml(p.category_name || '—')}</td>
          <td style="padding:0.6rem;color:var(--text-2)">${escHtml(p.author_username || 'AI')}</td>
          <td style="padding:0.6rem;color:var(--text-2)">${p.view_count || 0}</td>
          <td style="padding:0.6rem;color:var(--text-2)">${formatDate(p.published_at)}</td>
          <td style="padding:0.6rem;white-space:nowrap">
            <a href="/post/${escHtml(p.slug)}" target="_blank" class="btn btn-outline btn-sm" style="font-size:0.75rem;padding:0.2rem 0.5rem">View</a>
            <button class="btn btn-outline btn-sm" style="font-size:0.75rem;padding:0.2rem 0.5rem;color:var(--danger);margin-left:4px" onclick="adminDeletePost(${p.id})">Delete</button>
          </td>
        </tr>
      `).join('')}</tbody>
    </table></div>`;
    renderPag('posts-pagination', postsPage, data.pages, p => { postsPage = p; loadPosts(); });
  } catch { wrap.innerHTML = '<p style="color:var(--danger)">Failed to load posts.</p>'; }
}

window.adminDeletePost = async (id) => {
  if (!confirm('Delete this post permanently?')) return;
  try {
    await del(`/admin/posts/${id}`);
    document.getElementById(`post-row-${id}`)?.remove();
    toast('Post deleted');
    loadStats();
  } catch (e) { toast(e.message || 'Failed', 'error'); }
};

async function loadUsers() {
  const wrap = document.getElementById('users-table');
  wrap.innerHTML = `<div class="loader"><div class="spinner"></div></div>`;
  try {
    const data = await get(`/admin/users?page=${usersPage}`);
    if (!data.users.length) { wrap.innerHTML = '<p class="text-dim">No users.</p>'; return; }
    wrap.innerHTML = `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:0.85rem">
      <thead><tr style="border-bottom:1px solid var(--border);text-align:left">
        <th style="padding:0.6rem">Username</th>
        <th style="padding:0.6rem">Role</th>
        <th style="padding:0.6rem">Posts</th>
        <th style="padding:0.6rem">Comments</th>
        <th style="padding:0.6rem">Joined</th>
        <th style="padding:0.6rem">Actions</th>
      </tr></thead>
      <tbody>${data.users.map(u => `
        <tr style="border-bottom:1px solid var(--border)" id="user-row-${u.id}">
          <td style="padding:0.6rem;font-weight:500">${escHtml(u.username)}</td>
          <td style="padding:0.6rem"><span style="color:${u.role === 'admin' ? 'var(--warning)' : 'var(--text-2)'}">${escHtml(u.role)}</span></td>
          <td style="padding:0.6rem;color:var(--text-2)">${u.post_count || 0}</td>
          <td style="padding:0.6rem;color:var(--text-2)">${u.comment_count || 0}</td>
          <td style="padding:0.6rem;color:var(--text-2)">${formatDate(u.created_at)}</td>
          <td style="padding:0.6rem">
            ${u.role !== 'admin' ? `<button class="btn btn-outline btn-sm" style="font-size:0.75rem;padding:0.2rem 0.5rem;color:var(--danger)" onclick="adminDeleteUser(${u.id})">Delete</button>` : '—'}
          </td>
        </tr>
      `).join('')}</tbody>
    </table></div>`;
    renderPag('users-pagination', usersPage, data.pages, p => { usersPage = p; loadUsers(); });
  } catch { wrap.innerHTML = '<p style="color:var(--danger)">Failed to load users.</p>'; }
}

window.adminDeleteUser = async (id) => {
  if (!confirm('Delete this user? Their posts will be kept as anonymous.')) return;
  try {
    await del(`/admin/users/${id}`);
    document.getElementById(`user-row-${id}`)?.remove();
    toast('User deleted');
    loadStats();
  } catch (e) { toast(e.message || 'Failed', 'error'); }
};

function renderPag(elId, page, pages, onPage) {
  const el = document.getElementById(elId);
  if (pages <= 1) { el.innerHTML = ''; return; }
  let h = '';
  if (page > 1) h += `<button class="page-btn" onclick="(${onPage})(${page - 1})">← Prev</button>`;
  for (let i = Math.max(1, page - 2); i <= Math.min(pages, page + 2); i++)
    h += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="(${onPage})(${i})">${i}</button>`;
  if (page < pages) h += `<button class="page-btn" onclick="(${onPage})(${page + 1})">Next →</button>`;
  el.innerHTML = h;
}

async function loadStats() {
  try {
    const s = await get('/admin/stats');
    document.getElementById('stat-cards').innerHTML = `
      <div class="stat-card"><div class="stat-label">Total Posts</div><div class="stat-value">${s.posts}</div></div>
      <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-value">${s.users}</div></div>
      <div class="stat-card"><div class="stat-label">Comments</div><div class="stat-value">${s.comments}</div></div>
      <div class="stat-card"><div class="stat-label">Total Likes</div><div class="stat-value">${s.total_likes}</div></div>
      <div class="stat-card"><div class="stat-label">Total Views</div><div class="stat-value">${s.total_views}</div></div>
    `;
  } catch {
    toast('Failed to load stats', 'error');
  }
}

async function loadCategoriesForGen() {
  try {
    const cats = await get('/categories');
    const sel = document.getElementById('gen-category');
    sel.innerHTML = `<option value="">Auto (round-robin)</option>` +
      cats.map(c => `<option value="${escHtml(c.slug)}">${escHtml(c.name)}</option>`).join('');
  } catch {}
}

async function generatePosts() {
  const btn = document.getElementById('gen-btn');
  const catSlug = document.getElementById('gen-category').value;
  const count = parseInt(document.getElementById('gen-count').value);
  const results = document.getElementById('gen-results');

  btn.disabled = true;
  btn.textContent = '⏳ Generating…';
  results.innerHTML = `<div class="loader"><div class="spinner"></div></div><p class="text-muted text-sm" style="text-align:center;margin-top:0.5rem">This may take 10-30 seconds per post…</p>`;

  try {
    const data = await post('/admin/generate', { category_slug: catSlug || undefined, count });
    results.innerHTML = data.generated.map(r => r.success
      ? `<div style="background:rgba(34,197,94,0.1);border:1px solid #22c55e;border-radius:8px;padding:0.875rem 1rem;margin-bottom:0.75rem">
          ✓ <strong><a href="/post/${escHtml(r.post?.slug)}" style="color:#4ade80">${escHtml(r.post?.title)}</a></strong>
         </div>`
      : `<div style="background:rgba(239,68,68,0.1);border:1px solid #ef4444;border-radius:8px;padding:0.875rem 1rem;margin-bottom:0.75rem">
          ✕ Failed to generate post ${r.category ? `for ${escHtml(r.category)}` : ''}
         </div>`
    ).join('');
    loadStats();
  } catch (e) {
    results.innerHTML = `<div style="color:var(--danger)">Generation failed: ${escHtml(e.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '🤖 Generate Now';
  }
}

let clearLogsBound = false;
function bindClearLogs() {
  if (clearLogsBound) return;
  clearLogsBound = true;
  document.getElementById('clear-logs-btn').addEventListener('click', async () => {
    if (!confirm('Clear all AI generation logs?')) return;
    try {
      await del('/admin/logs');
      toast('Logs cleared');
      loadLogs();
    } catch (e) { toast(e.message || 'Failed', 'error'); }
  });
}

async function loadLogs() {
  const wrap = document.getElementById('logs-table');
  wrap.innerHTML = `<div class="loader"><div class="spinner"></div></div>`;
  try {
    const logs = await get('/admin/logs');
    if (!logs.length) { wrap.innerHTML = '<p class="text-dim">No generation logs yet.</p>'; return; }
    wrap.innerHTML = `
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:0.875rem">
          <thead>
            <tr style="border-bottom:1px solid var(--border);text-align:left">
              <th style="padding:0.75rem;color:var(--text-dim)">Date</th>
              <th style="padding:0.75rem;color:var(--text-dim)">Category</th>
              <th style="padding:0.75rem;color:var(--text-dim)">Post Title</th>
              <th style="padding:0.75rem;color:var(--text-dim)">Status</th>
              <th style="padding:0.75rem;color:var(--text-dim)">Trigger</th>
            </tr>
          </thead>
          <tbody>
            ${logs.map(l => `
              <tr style="border-bottom:1px solid var(--border)">
                <td style="padding:0.75rem;color:var(--text-2)">${formatDate(l.created_at)}</td>
                <td style="padding:0.75rem">${escHtml(l.category_name || '—')}</td>
                <td style="padding:0.75rem">
                  ${l.post_title
                    ? `<a href="/post/${escHtml(l.post_id)}" style="color:var(--primary-light)">${escHtml(l.post_title)}</a>`
                    : '<span style="color:var(--text-dim)">—</span>'}
                </td>
                <td style="padding:0.75rem">
                  <span style="color:${l.status === 'success' ? 'var(--success)' : 'var(--danger)'}">${l.status}</span>
                </td>
                <td style="padding:0.75rem;color:var(--text-2)">${escHtml(l.triggered_by)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  } catch {
    wrap.innerHTML = '<p style="color:var(--danger)">Failed to load logs.</p>';
  }
}
</script>
</body>
</html>
